name: Weekly Member Report

on:
  schedule:
    # Fridays at 8am, 12pm, and 4pm EST (13:00, 17:00, 21:00 UTC)
    # Script checks if report was already sent today — only sends once
    - cron: '0 13 * * 5'
    - cron: '0 17 * * 5'
    - cron: '0 21 * * 5'
  workflow_dispatch: {}  # allows manual trigger from GitHub Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send weekly member report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/send-member-report.mjs

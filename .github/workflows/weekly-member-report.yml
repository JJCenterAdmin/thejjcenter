name: Weekly Member Report

on:
  schedule:
    # Every 2 hours on Fridays (UTC) — script sends only once per day via report_log dedup
    - cron: '0 0 * * 5'
    - cron: '0 2 * * 5'
    - cron: '0 4 * * 5'
    - cron: '0 6 * * 5'
    - cron: '0 8 * * 5'
    - cron: '0 10 * * 5'
    - cron: '0 12 * * 5'
    - cron: '0 14 * * 5'
    - cron: '0 16 * * 5'
    - cron: '0 18 * * 5'
    - cron: '0 20 * * 5'
    - cron: '0 22 * * 5'
  workflow_dispatch: {}  # allows manual trigger from GitHub Actions tab

jobs:
  send-report:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Send weekly member report
        env:
          RESEND_API_KEY: ${{ secrets.RESEND_API_KEY }}
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
        run: node scripts/send-member-report.mjs
